author:
  handle: dave
  display_name: "Dave Killeen"
  linkedin_url: ""
  verified: true

description: |
  A complete daily-to-weekly operating system. Every session starts with strategic
  context already loaded. Every morning builds a focused plan from real data. Every
  evening closes the loop. Every week opens with aligned priorities and closes with
  a narrative ready for leadership. Between cadences, automated scans catch slipped
  commitments before they become problems.

