          - Webinar next week on growth strategies

      - name: "refresh-accounts"
        trigger: '/refresh-accounts'
        description: "Regenerate the account engagement summary from all tracked deal pages. Updates priority rankings, deal values, and activity status for stakeholder reporting."
        example_input: '/refresh-accounts'
        example_output: |
          Account summary regenerated from 24 tracked accounts.

          | Priority | Company | Deal Value | Last Activity |
          |----------|---------|-----------|---------------|
          | This Week | Globex | $300k | Workshop series |
          | This Week | Contoso | $430k | KPI prep |
          | Waiting | Fabrikam | TBD | Conference confirmed |

  workspace_structure:
    description: |
      The workflow expects a folder for account pages (one markdown file per
      tracked deal), plus folders for meeting notes, contact pages (one per
      person you interact with), and competitive intelligence. A tracking
      mechanism records which accounts you actively manage — this could be a
      structured file, a tagged list, or data synced from your CRM. If these
      don't exist, they should be created during setup.
    folders:
      - purpose: "Account pages — one file per tracked deal with structured metadata, qualification checklist, and engagement history"
        typical_path: "Accounts/"
        required: true
      - purpose: "Meeting notes — structured notes from customer and internal meetings"
        typical_path: "Meetings/"
        required: true
      - purpose: "Contact pages — external contacts (customers, partners), one page per person"
        typical_path: "People/External/"
        required: true
      - purpose: "Contact pages — internal colleagues"
        typical_path: "People/Internal/"
        required: false
      - purpose: "Tasks — a task list or backlog where action items and commitments are tracked"
        typical_path: "Tasks/"
        required: true
      - purpose: "Competitive intelligence — competitor registry, reports, battle cards, and alerts"
        typical_path: "Intel/Competitive/"
        required: false
      - purpose: "Account tracking — a mechanism for recording which accounts you actively manage and their segment/priority (could be a structured file, a tagged list, or synced from your CRM)"
        typical_path: "assignments"
        required: true

  data_patterns:
    - name: "Account page"
      description: |
        Each tracked deal has a markdown page with structured metadata at the
        top (stage, ARR, owner, segment, priority, communication channels)
        and sections for a deal qualification checklist (covering areas like
        metrics, economic buyer, champion, decision process, and competition),
        call intelligence from transcript analysis, engagement history,
        executive connections, and notes. Updated by multiple commands —
        add-deal creates it, analyze-deal enriches it, deals-attention scans it.
      example: |
        ---
        type: account
        stage: "Stage 2"
        arr: "$280k"
        owner: "Regional AE"
        segment: "enterprise"
        priority: "this_week"
        channels:
          - name: "deal-channel"
        ---
        (The section between the dashes at the top is structured metadata
        the system reads automatically.)

        # Northwind Traders

        ## Metrics
        Reducing churn by 15% is the stated KPI.

        ## Economic Buyer
        VP Product — identified but not yet engaged directly.

        ## Champion
        Director of Analytics — strong internal advocate.

        ## Call Intelligence
        Last analyzed: 2024-01-15 (4 calls)
        - Value Selling: 2/5 (HIGH priority)
        - KPI Connection: 1/5 (HIGH priority)

        ## Engagement History
        | Date | Activity | Notes |
        |------|----------|-------|
        | 2024-01-15 | Discovery call | Initial qualification |
        | 2024-02-01 | Demo | Showed analytics suite |

        ## Executive Connections
        - VP Engineering — LinkedIn connection

    - name: "Account tracking"
      description: |
        A tracking mechanism for which accounts you actively manage — could
        be a structured file, a tagged list, or synced from your CRM. Records
        each account's segment (enterprise vs commercial) and current priority.
        Used by the attention scanner and stakeholder reporting commands.
      example: |
        # Example structured format (adapt to your tooling):
        assigned:
          - name: "Northwind Traders"
            segment: enterprise
          - name: "Contoso Ltd"
            segment: enterprise
          - name: "Fabrikam Inc"
            segment: commercial

    - name: "Deal scoring framework"
      description: |
        A configurable scoring framework used by the analyze-deal command to
        evaluate call transcripts. Each category is scored on a scale with a
        priority level. Most categories use a 1-5 quality scale. Product
        Breadth uses a wider scale (default 1-7) because it counts how many
        of your available product capabilities were discussed — the upper
        bound should match the number of distinct capabilities in your
        catalogue, so adjust it to fit. Roles can add or replace categories
        — for example, Customer Success might add Renewal Signals and
        Expansion Indicators.
      example: |
        scoring_categories:
          - name: "Value Selling"
            scale: "1-5"
            description: "Is the conversation framed around business outcomes, not features?"
          - name: "KPI Connection"
            scale: "1-5"
            description: "Are customer KPIs explicitly linked to product capabilities?"
          - name: "Competitive Positioning"
            scale: "1-5"
            description: "Is the team proactively differentiating against alternatives?"
          - name: "Stakeholder Coverage"
            scale: "1-5"
            description: "Are the right people in the room — economic buyer, champion, technical evaluator?"
          - name: "Product Breadth"
            scale: "1-N (default 1-7, where N = number of distinct product capabilities)"
            description: "How many relevant capabilities have been discussed vs available?"

    - name: "Competitive intel report"
      description: |
        A dated markdown report with sections for critical alerts, threat-level
        dashboard, per-competitor analysis (what changed, impact, voice of
        customer), win/loss patterns, feature gaps, blind spots, and recommended
        actions. Generated by the competitive-intel command.

    - name: "Stakeholder update"
      description: |
        A structured message with a date, narrative highlight, accounts table
        (active and waiting), internal enablement bullets, external/thought
        leadership bullets, and an optional observation. Designed to be sent
        directly to leadership via chat.

  integrations:
    - name: "CRM / revenue intelligence"
      examples: ["Salesforce", "HubSpot", "Clari", "Gong"]
      required: false
      value: "Pulls deal metadata (stage, ARR, owner) when adding accounts. Without this, you enter deal metadata manually and the workflow still works."
    - name: "Meeting intelligence"
      examples: ["Momentum", "Gong", "Chorus", "Granola"]
      required: false
      value: "Surfaces meeting history and transcripts for deal analysis and commitment tracking. Enables the transcript scoring framework. Without this, you analyze deals from your own notes and track commitments manually."
    - name: "Chat/messaging"
      examples: ["Slack", "Microsoft Teams"]
      required: false
      value: "Discovers deal-related channels, monitors for activity, and enables sending drafted messages directly. Without this, you track communication channels manually and copy messages to your preferred tool."
    - name: "Calendar"
      examples: ["Google Calendar", "Outlook Calendar"]
      required: false
      value: "Enriches stakeholder updates with meeting activity from the past and upcoming weeks. Without this, you describe your week from memory."
    - name: "Professional network"
      examples: ["LinkedIn Sales Navigator", "LinkedIn"]
      required: false
      value: "Flags VP+ connections at new accounts — surfaces executive relationships you already have. Without this, you check your network manually."
    - name: "Competitor changelog/blog feeds"
      examples: ["RSS", "web scraping"]
      required: false
      value: "Enables automated competitive intelligence gathering from public sources. Without this, competitive intel relies on manual research and meeting transcript mentions."
    - name: "Semantic search"
      examples: ["local vector search", "embedding-based search"]
      required: false
      value: "Finds thematically related accounts and cross-deal patterns that keyword search misses. Without this, the attention scanner and cracks detector use simple file scanning instead."

  behaviors:
    - description: "When a new account page is created, automatically enrich it with deal metadata from revenue tools, meeting history counts, and executive network connections"
      trigger: "After an account page is created or saved"
      automatic: true
    - description: "When reading any account page, surface cross-deal intelligence — similar deals at the same stage, staleness alerts, and patterns appearing across multiple accounts"
      trigger: "When opening an account page"
      automatic: true
    - description: "When reading any file that references a company, display key contacts, recent meetings, open tasks, and deal status as additional context alongside the file content"
      trigger: "When opening a file that mentions a tracked company"
      automatic: true
    - description: "During weekly planning, run the attention scanner and surface any red-status accounts that need immediate action"
      trigger: "During weekly planning"
      automatic: false
    - description: "During morning planning, scan for slipped commitments and surface any high-risk cracks — overdue action items, contacts without follow-up, and urgent items not started"
      trigger: "During morning planning"
      automatic: false
    - description: "Periodically check when the last competitive intel report was generated and nudge if it's overdue"
      trigger: "During morning planning"
      automatic: false
    - description: "After generating a stakeholder update, silently update contact pages, project pages, and account pages with any new activity referenced in the update"
      trigger: "After stakeholder update is generated"
      automatic: true

  roles:
    - name: "Sales / Account Executive"
      adaptation: |
        Account pages focus on pipeline progression and next steps. The attention
        scanner emphasises deal velocity and close-date risk. Commitment tracking
        prioritises customer-facing promises. Stakeholder updates are framed
        around quota attainment and forecast accuracy.
      example_differences:
        - "Attention scanner flags deals where close date is within 30 days but stage hasn't advanced"
        - "Competitive intel prioritises active evaluations in your pipeline over general market moves"
        - "Draft messages default to customer-facing follow-ups before internal updates"
    - name: "Sales Engineering / Field CTO"
      adaptation: |
        Account pages include technical qualification and product fit sections.
        The transcript analyzer scores for technical depth and solution breadth.
        Commitment tracking watches for PoC deliverables and demo follow-ups.
        Stakeholder updates highlight technical wins and enablement delivered.
      example_differences:
        - "Transcript analysis includes a 'product breadth' score — how many capabilities were discussed vs available"
        - "Attention scanner checks whether technical validation has been completed for late-stage deals"
        - "Cracks detector flags overdue PoC deliverables and demo follow-up materials"
    - name: "Customer Success"
      adaptation: |
        Account pages reframe around health score, renewal timeline, and
        expansion opportunities. The attention scanner watches for declining
        engagement rather than deal progression. Commitment tracking focuses
        on support promises and review cadences. Stakeholder updates emphasise
        retention and growth metrics.
      example_differences:
        - "Attention scanner flags accounts with no meeting in 3+ weeks as churn risk, not just staleness"
        - "Stakeholder update includes a 'Renewals This Quarter' section with health indicators"
        - "Draft messages prioritise proactive check-ins over reactive follow-ups"
    - name: "Revenue Leader / VP Sales"
      adaptation: |
        The system operates at portfolio level rather than individual deal level.
        Attention scanning summarises team pipeline health. Commitment tracking
        aggregates overdue items by rep. Stakeholder updates aggregate across
        reps. Competitive intel feeds into enablement priorities.
      example_differences:
        - "Attention dashboard groups accounts by rep and shows team-level red/yellow/green distribution"
        - "Competitive intel recommends specific enablement sessions based on where reps are losing"
        - "Cracks detector surfaces systemic patterns — are multiple reps missing the same follow-up type?"
      example_output_snippets:
        deals_attention: |
          ## Team Pipeline Health

          | Rep | Green | Yellow | Red | Total |
          |-----|-------|--------|-----|-------|
          | A. Lee | 8 | 2 | 1 | 11 |
          | B. Chen | 5 | 4 | 3 | 12 |
          | C. Park | 7 | 1 | 0 | 8 |

          **Team Summary:** 31 accounts (20 green / 7 yellow / 4 red)

          ### Red Accounts by Rep
          | Rep | Account | Issue | Days Stale |
          |-----|---------|-------|------------|
          | A. Lee | Contoso Ltd | No meeting in 4 weeks | 28 |
          | B. Chen | Fabrikam Inc | Missing Economic Buyer | 14 |
          | B. Chen | Woodgrove | No touch in 21 days | 21 |
          | B. Chen | Tailspin | Close date passed, stage unchanged | 35 |
        cracks: |
          ## Systemic Cracks

          | Pattern | Reps Affected | Count | Risk |
          |---------|---------------|-------|------|
          | Post-demo follow-up missing | B. Chen, C. Park | 4 items | High |
          | Champion check-in overdue | A. Lee, B. Chen | 3 items | Medium |

          **Interpretation:** Post-demo follow-ups are a team-wide gap, not
          a single-rep issue. Consider adding it to the deal stage checklist.
    - name: "Product Leader"
      adaptation: |
        Account pages emphasise feature requests and product feedback captured
        in meetings. Competitive intel focuses on feature gaps and product
        differentiation. Commitment tracking watches for roadmap promises made
        to customers. Stakeholder updates highlight product-influenced wins
        and customer advisory engagement.
      example_differences:
        - "Transcript analysis extracts feature requests and maps them to product roadmap areas"
        - "Competitive intel produces a 'Feature Gap' heatmap showing where competitors are ahead"
        - "Cracks detector flags roadmap commitments made in customer meetings that haven't been relayed to product"
      example_output_snippets:
        deals_attention: |
          ## Deals Needing Product Attention

          | Account | Feature Request | Roadmap Area | Status | Risk |
          |---------|----------------|--------------|--------|------|
          | Contoso Ltd | Bulk export API | Platform / API | Not planned | High — deal blocker |
          | Globex | SSO with SAML | Security | Q2 roadmap | Low — on track |
          | Fabrikam Inc | Custom dashboards | Analytics | Under review | Medium — no ETA given |

          **Summary:** 6 open feature requests across 4 accounts.
          2 are deal blockers with no roadmap commitment.
        cracks: |
          ## Roadmap Commitments at Risk

          | Account | Promise Made | Meeting Date | Relayed to Product? | Risk |
          |---------|-------------|-------------|---------------------|------|
          | Contoso Ltd | "We'll have bulk export by Q2" | 2024-01-15 | No | High |
          | Northwind | "Dashboard customization is on our radar" | 2024-02-01 | Yes — under review | Medium |

          **Action:** 1 roadmap promise made to a customer has not been
          relayed to the product team. Surface before the next customer call.


# ---- MATCHING ----

matching:
  roles: ["Sales", "Sales Engineering", "Customer Success", "Product", "Revenue Leadership"]
  requires_any: ["account-pages", "deal-tracking"]
  enhanced_by: ["salesforce", "hubspot", "clari", "gong", "momentum", "granola", "slack", "calendar", "linkedin", "semantic-search"]
  signals:
    - trigger: "user creates 3+ account or company pages manually"
      suggestion: "You're tracking deals by hand. There's a workflow that structures account pages, scans for gaps, and tells you which deals need attention — want to try it?"
    - trigger: "user searches for competitive information in meetings"
      suggestion: "You're researching competitors manually. There's a workflow that gathers changelogs, news, and your own transcripts to produce a threat dashboard. Interested?"
    - trigger: "user writes a status update for their manager"
      suggestion: "You just assembled a status update from scratch. There's a workflow that generates these from your tracked accounts and calendar. Want me to set it up?"
    - trigger: "user connects a CRM or revenue tool for first time"
      suggestion: "Now that you have CRM data, your deal tracker can pull stage, value, and owner automatically when you add accounts. Want to enable that?"
    - trigger: "user reads 5+ account pages in one session"
      suggestion: "Looks like you're reviewing your pipeline. There's a command that scans all accounts and flags which ones need attention — saves you from checking each one."
