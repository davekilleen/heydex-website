# ---- IDENTITY ----

id: deal-intelligence
name: "Deal Intelligence System"
version: 2.0.0
dexdiff_schema: "2.0"

author:
  handle: dave
  display_name: "Dave Killeen"
  role: "Field CPO"
  verified: true

description: "Know which deals need attention — and why — before anyone has to ask. Track accounts, surface staleness and qualification gaps, catch slipped commitments, draft the right messages, run competitive intel, and generate stakeholder updates. Works inside any markdown-based workspace where you keep account pages, meeting notes, and contact pages (pages that track the people you interact with — one per person)."

tags: [deal-intelligence, pipeline-health, account-management, competitive-intel, stakeholder-reporting, commitment-tracking]

created: 2026-04-09
updated: 2026-04-09


# ---- DISTRIBUTION ----

distribution:
  visibility: curated
  targets:
    orgs: []
    groups: []
    individuals: []
  delivery: available
  required: false


# ---- THE METHODOLOGY ----

methodology:

  problem: |
    You manage dozens of accounts across regions and segments. Some are progressing,
    some are stalling, and some have gaps in qualification you haven't noticed yet.
    Without a system, the only way to know which deals need attention is to manually
    review each one — by which time the stale ones have already slipped. Commitments
    made in meetings get forgotten because nobody tracks them systematically. You owe
    someone a follow-up from two weeks ago and only realise when they chase you.
    Your manager asks for an update and you spend an hour assembling it from memory
    and scattered notes. Competitors ship features and you find out from a prospect,
    not your own intelligence. Cross-deal patterns — like the same objection
    appearing in three accounts — go unnoticed because each deal lives in its own
    silo. The messages you should be sending — status updates, unblock requests,
    accountability acknowledgements — pile up until they become awkward.

  solution: |
    A cluster of commands that work together across four layers:

    **1. Visibility — know what needs attention**

    Without a system, the only way to know which deals need attention is to
    manually review each one. A scanning command checks every tracked account
    for staleness, qualification gaps, and missing activity — producing a
    red/yellow/green dashboard you can glance at in seconds. When you open
    any account page, the system automatically surfaces cross-deal patterns:
    similar deals at the same stage, common objections, and how long since
    your last analysis.

    **2. Accountability — catch slipping commitments**

    Commitments made in meetings get forgotten because nobody tracks them
    systematically. A separate command scans for slipped commitments using
    concrete heuristics: action items past their due date, contact pages
    without a follow-up task after recent meetings, and urgent items with
    no activity in 7+ days. It cross-references your meetings, tasks, and
    contact pages to catch things falling through the cracks before they
    damage relationships.

    **3. Communication — send the right message**

    The messages you should be sending — status updates, unblock requests,
    accountability acknowledgements — pile up until they become awkward.
    A message drafting command generates ready-to-send messages based on
    detected gaps. Each message includes the recipient, the source
    commitment, and a contextual draft in the right tone.

    **4. Intelligence — competitive and cross-deal patterns**

    Competitors ship features and you find out from a prospect. Cross-deal
    patterns — like the same objection appearing in three accounts — go
    unnoticed because each deal lives in its own silo. A competitive intel
    command gathers competitor changelogs, news, pricing pages, and your own
    meeting transcripts to produce a threat-level dashboard with specific
    actions. A transcript analysis command scores calls against a framework
    — value selling, stakeholder coverage, competitive positioning — and
    produces coaching recommendations with evidence.

    **Bringing it together**

    You add a deal once and the system creates a structured account page,
    pulls metadata from your revenue tools, discovers related communication
    channels, and flags executive connections you already have. For
    stakeholder reporting, one command regenerates an account engagement
    summary from your tracked deals, and another blends that with your
    calendar, tasks, and verbal input to produce a structured update —
    accounts table, internal enablement, thought leadership, and
    observations — ready to send.

    Newly created account pages are automatically enriched with data from
    revenue tools and executive network connections. When you read any file
    that references a company, the system displays key contacts, recent
    meetings, and open tasks as additional context alongside the file
    content.

  user_experience:
    commands:
      - name: "add-deal"
        trigger: '/add-deal [company name]'
        description: "Add a company to your tracked deals. Creates a structured account page, pulls deal metadata from revenue tools, discovers communication channels, flags executive connections, and adds the account to your tracking list."
        example_input: '/add-deal "Northwind Traders"'
        example_output: |
          # Adding Northwind Traders

          **Segment:** Enterprise

          ## Deal Metadata (from revenue tools)
          | Field | Value |
          |-------|-------|
          | Account | Northwind Traders |
          | Stage | Stage 2 |
          | ARR | $280k |
          | Owner | Regional AE |

          ## Communication Channels
          - Found deal channel — you're a member
          - Found voice-of-customer channel — you're not a member (join for deal activity)
          *(Channel naming conventions will vary by organisation.)*

          ## Executive Connections
          You have VP+ connections at Northwind Traders:
          - VP Engineering — connected via LinkedIn

          ## Next Steps
          - Account page created at Accounts/Northwind_Traders.md
          - Added to your tracked accounts
          - Run /analyze-deal "Northwind Traders" to analyze call transcripts

      - name: "analyze-deal"
        trigger: '/analyze-deal [account name]'
        description: "Analyze call transcripts for a specific account against a scoring framework — value selling, stakeholder coverage, competitive positioning, qualification depth, and product breadth. Most categories use a 1-5 scale. Product Breadth uses a wider scale (e.g. 1-7) because it measures how many of your available product capabilities were discussed — the upper bound depends on your product catalogue. Produces coaching recommendations with evidence quotes."
        example_input: '/analyze-deal "Northwind Traders"'
        example_output: |
          # Northwind Traders Deal Analysis

          ## Deal Overview
          | Field | Value |
          |-------|-------|
          | Account | Northwind Traders |
          | Stage | Stage 2 |
          | ARR | $280k |
          | Owner | Regional AE |
          | Calls Analyzed | 4 |

          ## Scoring Framework
          | Pattern | Score | Priority |
          |---------|-------|----------|
          | Value Selling | 2/5 | HIGH |
          | KPI Connection | 1/5 | HIGH |
          | Competitive Positioning | 3/5 | Medium |
          | Stakeholder Coverage | 4/5 | Low |
          | Product Breadth | 2/7 | HIGH |

          ## Top Coaching Opportunities
          1. **KPI Connection (HIGH)** — Customer mentioned "reducing churn by 15%"
             but the team didn't connect it to product capabilities. Prep ROI
             talking points for next call.
          2. **Product Breadth (HIGH)** — Only 2 of 7 products discussed.
             Introduce predictive capabilities given their retention focus.

          ## Key Quotes
          > "We're just looking for better analytics" — Jan 10 call
          > Warning: This framing limits deal size. Reframe around business outcomes.

      - name: "deals-attention"
        trigger: '/deals-attention'
        description: "Quick scan of all tracked accounts. Checks staleness (days since last touch), qualification gaps (missing sections in deal framework), and recent meeting activity. Produces a red/yellow/green dashboard."
        example_input: '/deals-attention'
        example_output: |
          ## Deals Needing Attention

          | Account | Issue | Days Stale | Action Needed |
          |---------|-------|------------|---------------|
          | Northwind Traders | No touch | 18 | Schedule check-in |
          | Contoso Ltd | Missing Economic Buyer | 5 | Identify EB in next call |
          | Fabrikam Inc | No meeting in 4 weeks | 28 | Escalate with AE |

          **Summary:** 24 accounts tracked (15 green / 6 yellow / 3 red)

          ### Status Key
          - **Green:** Touched in last 7 days, 0-2 qualification gaps
          - **Yellow:** Stale 7-14 days, or 3-4 qualification gaps
          - **Red:** Stale 14+ days, or 5+ gaps, or no meeting in 3+ weeks

      - name: "cracks"
        trigger: '/cracks'
        description: "Scan for slipped commitments and things falling through the cracks. A slipped commitment is any of: action items past their due date, contact pages without a follow-up task after recent meetings, or urgent items with no activity in 7+ days. Cross-references meetings, tasks, and contact pages to surface these before they damage relationships."
        example_input: '/cracks'
        example_output: |
          ## Cracks Detected

          | Item | Age | Source | Risk |
          |------|-----|--------|------|
          | Follow up with VP at Contoso on pricing | 5 days | Meeting action item | High |
          | Review regional expansion deck | 4 days | Weekly priorities | Medium |
          | Check in with Fabrikam champion | — | No task after meeting | Medium |

          **Summary:** 4 cracks detected (2 high, 2 medium)

          ### Risk Classification
          - **High:** 5+ days overdue, customer-facing, or explicitly urgent
          - **Medium:** 3-4 days overdue, internal stakeholder
          - **Low:** 3 days old, no deadline, internal only

      - name: "draft-messages"
        trigger: '/draft-messages'
        description: "Generate ready-to-send messages based on detected accountability gaps, stale accounts, and blocked items. Each message includes the recipient, suggested channel, source commitment, and a contextual draft in the right tone."
        example_input: '/draft-messages'
        example_output: |
          ## Draft Messages

          ### Accountability Debts (Send First)

          #### To Regional VP — Chat DM
          **Why:** Promised account strategy update 5 days ago
          **Source:** Meeting action item from last week

          > Hey — wanted to flag I'm still working on the account strategy
          > update. Should have it to you by Wednesday. Anything urgent
          > blocking you in the meantime?

          ---

          ### Status Updates

          #### To Sales Team — Team Channel
          **Why:** No touchpoint with Northwind Traders in 12 days
          **Source:** Account page

          > Quick update on Northwind: Still in evaluation phase.
          > Next step is follow-up call scheduled for next week.

          ---

          ### Unblock Requests

          #### To Solutions Architect — Chat DM
          **Why:** Waiting on technical validation for Contoso
          **Source:** Task list

          > Can you send over the Contoso technical validation results
          > when you have them? I need to update the customer before Friday.

      - name: "competitive-intel"
        trigger: '/competitive-intel'
        description: "Generate a competitive intelligence report. Gathers competitor changelogs, news, pricing pages, and social feeds. Searches your meeting transcripts for competitive mentions. Classifies each mention by type (active evaluation, switching, feature gap, etc.) and produces a threat-level dashboard with actions."
        example_input: '/competitive-intel'
        example_output: |
          # Competitive Intelligence Brief
          **Period:** Last 30 days | **Competitors Tracked:** 15

          ## Critical Alerts
          | Signal | Competitor | Threat | Action |
          |--------|-----------|--------|--------|
          | New AI feature launch | Rival A | HIGH | Update battle card, brief AEs |
          | Pricing page change | Rival B | MED | Verify impact on mid-market deals |

          ## Threat Level Dashboard
          | Competitor | Level | Direction | Key Driver |
          |-----------|-------|-----------|------------|
          | Rival A | 7/10 | UP | AI feature parity closing |
          | Rival B | 5/10 | -> | No major changes |
          | Rival C | 3/10 | DOWN | Lost key customer publicly |

          ## Voice of the Field
          | Date | Account | Competitor | Context | Category |
          |------|---------|-----------|---------|----------|
          | YYYY-MM-DD | Acme | Rival A | Prospect comparing side by side | Active Eval |
          | YYYY-MM-DD | Globex | Rival B | Switching from competitor | Switching From |

          ## Recommended Actions
          1. Update Rival A battle card with new AI capabilities
          2. Prep competitive talk track for 3 active evaluations

      - name: "stakeholder-update"
        trigger: '/stakeholder-update'
        description: "Generate a structured status update for leadership showing account engagement, internal enablement, external activity, and observations. Blends data from tracked accounts, calendar, tasks, and verbal input."
        example_input: '/stakeholder-update'
        example_output: |
          YYYY-MM-DD

          **Highlight: Completed Workshop Series with Globex**

          Delivered the final session of a multi-part strategy workshop with the
          Globex team. They've committed to expanding scope into additional
          business units.

          **Accounts & Sales Support**

          | Company | Deal Value | My Activity | Owner |
          |---------|-----------|-------------|-------|
          | **Globex** | $300k | Workshop series complete. Expansion discussion started. | J. Smith |
          | **Contoso** | $430k | Strategy workshop scheduled for next week. | M. Jones |

          **Waiting for AE**

          | Company | Deal Value | My Activity | Owner |
          |---------|-----------|-------------|-------|
          | **Fabrikam** | TBD | Conference speaking slot confirmed. | TBD |

          **Internal Enablement**
          - Running enablement session with team on product advisory
          - Coaching new hire on running workshops independently

          **External / Thought Leadership**
