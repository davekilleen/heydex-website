name: CI

# First CI for this repo (plan U9). E2E battery runs against the dedicated
# test deployment (brave-ibex-877, project "dex" dev) — NEVER against the
# DexDiff production deployment (gallant-reindeer-229).
#
# Required repo secrets (see TEST_SETUP.md "CI" section):
#   CONVEX_DEPLOY_KEY_TEST  — deploy key for the brave-ibex-877 dev deployment
#   E2E_TEST_SECRET         — matches the E2E_TEST_SECRET env var on that deployment

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_CONVEX_URL: https://brave-ibex-877.eu-west-1.convex.cloud
      E2E_BASE_URL: http://127.0.0.1:3000
      E2E_API_BASE_URL: https://brave-ibex-877.eu-west-1.convex.site/api
      E2E_TEST_SECRET: ${{ secrets.E2E_TEST_SECRET }}
      E2E_REQUIRE_AUTH: "1"
      VITE_REQUIRE_AUTH: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Push the current commit's Convex functions to the test deployment
      # BEFORE testing — otherwise the suite exercises stale functions and
      # green means nothing (doc-review finding on plan U9).
      - name: Deploy Convex functions to test deployment
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY_TEST }}
        run: npx convex deploy --yes

      - name: Build (wrong-deployment tripwire value baked here is the TEST one — CI only)
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e suite
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: output/playwright/report
          retention-days: 7
