name: CI

# First CI for this repo (plan U9). E2E battery runs against the dedicated
# test deployment (brave-ibex-877, project "dex" dev) — NEVER against the
# DexDiff production deployment (gallant-reindeer-229).
#
# Required repo secrets (see TEST_SETUP.md "CI" section):
#   CONVEX_DEPLOY_KEY_TEST  — deploy key for the brave-ibex-877 dev deployment
#   E2E_TEST_SECRET         — matches the E2E_TEST_SECRET env var on that deployment

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VITE_CONVEX_URL: https://brave-ibex-877.eu-west-1.convex.cloud
      E2E_BASE_URL: http://127.0.0.1:3000
      E2E_API_BASE_URL: https://brave-ibex-877.eu-west-1.convex.site/api
      E2E_TEST_SECRET: ${{ secrets.E2E_TEST_SECRET }}
      # NOTE: the main battery runs with the auth gate OFF, matching
      # scripts/run-e2e-dev.sh — profile pages cold-load anonymously in the
      # suite's world. The gate itself is covered by the dedicated step below.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Push the current commit's Convex functions to the test deployment
      # BEFORE testing — otherwise the suite exercises stale functions and
      # green means nothing (doc-review finding on plan U9).
      - name: Mark the dedicated deployment as test-only
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY_TEST }}
        run: npx convex env set CONVEX_ENV test

      - name: Deploy Convex functions to test deployment
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY_TEST }}
        run: npx convex deploy --yes

      - name: Build (wrong-deployment tripwire value baked here is the TEST one — CI only)
        run: npm run build

      - name: Run source security contract
        run: node --test tests/beta-gate-contract.test.mjs

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Put dedicated test deployment in legacy mode for the existing suite
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY_TEST }}
        run: npx convex env set BETA_GATE off

      - name: Run e2e suite
        run: npx playwright test

      - name: Run auth-gate spec (gate ON, mirrors npm run e2e:gate)
        env:
          VITE_REQUIRE_AUTH: "1"
          E2E_REQUIRE_AUTH: "1"
          E2E_BASE_URL: http://127.0.0.1:3001
          E2E_WEB_SERVER_COMMAND: npm run dev -- --host 127.0.0.1 --port 3001
          E2E_REUSE_EXISTING_SERVER: "0"
        run: npx playwright test tests/e2e/auth-gate.spec.ts

      - name: Enable private-beta enforcement on the dedicated test deployment
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY_TEST }}
        run: npx convex env set BETA_GATE on

      - name: Run private-beta allowlist boundary
        env:
          E2E_BETA_GATE: "1"
        run: npx playwright test tests/e2e/beta-gate.spec.ts

      - name: Restore dedicated test deployment for the existing suite
        if: always()
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY_TEST }}
        run: npx convex env set BETA_GATE off

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: output/playwright/report
          retention-days: 7
