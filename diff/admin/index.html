<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DexDiff Admin — Love Letters</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9670;</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-base: #0a0a0a;
      --bg-surface: #111111;
      --bg-elevated: #161616;
      --bg-hover: #1a1a1a;
      --border-subtle: #1c1c1c;
      --border-default: #222222;
      --border-strong: #333333;
      --text-primary: #f0f0f0;
      --text-secondary: #888888;
      --text-tertiary: #777777;
      --text-inverse: #0a0a0a;
      --accent: #FF3870;
      --accent-dim: #992244;
      --accent-bg: #1f0f15;
      --accent-border: #3d0a1e;
      --success: #22c55e;
      --error: #ef4444;
      --font-mono: 'Geist Mono', 'Berkeley Mono', 'JetBrains Mono', monospace;
      --font-sans: 'Geist', system-ui, sans-serif;
    }

    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: "kern" 1, "liga" 1, "calt" 1;
    }

    a { color: inherit; text-decoration: none; }

    /* ── NAV BAR ──────────────────────────────────── */

    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      background: rgba(10, 10, 10, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-subtle);
    }

    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      text-decoration: none;
      letter-spacing: 0.02em;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .nav-link {
      font-family: var(--font-mono);
      font-size: 11px;
      color: #aaaaaa;
      text-decoration: none;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 80ms ease;
    }

    .nav-link:hover { color: var(--text-primary); }
    .nav-link.active { color: var(--text-primary); }

    /* ── PAGE ──────────────────────────────────────── */

    .page {
      max-width: 800px;
      margin: 0 auto;
      padding: 80px 24px 96px;
    }

    .page-title {
      font-family: var(--font-sans);
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 24px;
    }

    /* ── STATS BAR ─────────────────────────────────── */

    .stats-bar {
      display: flex;
      gap: 24px;
      margin-bottom: 24px;
      padding: 16px 20px;
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: 2px;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stat-count {
      font-family: var(--font-mono);
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .stat-label {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .stat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .stat-dot.pending { background: #f59e0b; }
    .stat-dot.published { background: var(--success); }
    .stat-dot.rejected { background: var(--error); }

    /* ── TABS ──────────────────────────────────────── */

    .tabs {
      display: flex;
      gap: 24px;
      border-bottom: 1px solid var(--border-default);
      margin-bottom: 20px;
    }

    .tab {
      font-family: var(--font-sans);
      font-size: 13px;
      color: var(--text-secondary);
      padding: 0 0 10px 0;
      cursor: pointer;
      transition: color 80ms ease;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      background: none;
    }

    .tab:hover { color: var(--text-primary); }

    .tab.active {
      color: var(--text-primary);
      border-bottom-color: var(--accent);
    }

    .tab-count {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-tertiary);
      margin-left: 4px;
    }

    /* ── CARDS ─────────────────────────────────────── */

    .card-stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .admin-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: 2px;
      padding: 20px;
    }

    .admin-card-top {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .admin-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FF3870 0%, #992244 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .admin-avatar img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }

    .admin-avatar-initials {
      font-family: var(--font-mono);
      font-size: 13px;
      color: #fff;
      font-weight: 500;
    }

    .admin-card-body { flex: 1; min-width: 0; }

    .admin-card-name {
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .admin-card-role {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }

    .admin-card-text {
      font-family: var(--font-sans);
      font-size: 14px;
      color: #ccc;
      font-style: italic;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    .admin-card-text::before { content: '\201C'; color: #666; }
    .admin-card-text::after { content: '\201D'; color: #666; }

    .admin-card-meta {
      font-family: var(--font-mono);
      font-size: 11px;
      color: #666;
      margin-bottom: 12px;
    }

    .admin-card-actions {
      display: flex;
      gap: 8px;
    }

    .action-btn {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 2px;
      border: none;
      cursor: pointer;
      transition: opacity 80ms ease;
    }

    .action-btn:hover { opacity: 0.85; }
    .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-publish {
      background: var(--success);
      color: #000;
    }

    .btn-reject {
      background: transparent;
      border: 1px solid var(--error);
      color: var(--error);
    }

    .btn-unpublish {
      background: transparent;
      border: 1px solid #f59e0b;
      color: #f59e0b;
    }

    /* ── EMPTY STATE ────────────────────────────────── */

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-secondary);
      font-family: var(--font-sans);
      font-size: 14px;
    }

    /* ── LOADING ─────────────────────────────────────── */

    .loading {
      text-align: center;
      padding: 48px;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-size: 12px;
    }

    /* ── RESPONSIVE ─────────────────────────────────── */

    @media (max-width: 600px) {
      .page { padding: 64px 16px 64px; }
      .stats-bar { gap: 16px; flex-wrap: wrap; }
      .admin-card-actions { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

  <nav class="nav" aria-label="Main navigation">
    <div class="nav-inner">
      <a href="/diff/" class="nav-logo">&#9670; dexdiff</a>
      <div class="nav-links">
        <a href="/diff/community/" class="nav-link">Community</a>
        <a href="/diff/love-letters/" class="nav-link">Love Letters</a>
        <a href="/diff/admin/" class="nav-link active">Admin</a>
      </div>
    </div>
  </nav>

  <div class="page">
    <h1 class="page-title">Love Letter Moderation</h1>

    <div class="stats-bar" id="stats-bar">
      <div class="stat-item">
        <span class="stat-dot pending"></span>
        <span class="stat-count" id="stat-pending">-</span>
        <span class="stat-label">Pending</span>
      </div>
      <div class="stat-item">
        <span class="stat-dot published"></span>
        <span class="stat-count" id="stat-published">-</span>
        <span class="stat-label">Published</span>
      </div>
      <div class="stat-item">
        <span class="stat-dot rejected"></span>
        <span class="stat-count" id="stat-rejected">-</span>
        <span class="stat-label">Rejected</span>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('pending', this)">Pending <span class="tab-count" id="tab-count-pending"></span></button>
      <button class="tab" onclick="switchTab('published', this)">Published <span class="tab-count" id="tab-count-published"></span></button>
      <button class="tab" onclick="switchTab('rejected', this)">Rejected <span class="tab-count" id="tab-count-rejected"></span></button>
    </div>

    <div class="card-stack" id="card-stack">
      <div class="loading">Loading...</div>
    </div>
  </div>

  <script>
    // ── Config ──────────────────────────────────────
    const CONVEX_URL = 'https://focused-mouse-723.eu-west-1.convex.cloud';
    const JWT_STORAGE_KEY = '__convexAuthJWT';
    const ADMIN_HANDLES = ['dave'];

    function getAccessToken() {
      return localStorage.getItem(JWT_STORAGE_KEY);
    }

    // ── Convex helpers ──────────────────────────────
    async function callQuery(path, args) {
      const token = getAccessToken();
      const headers = { 'Content-Type': 'application/json' };
      if (token) headers['Authorization'] = 'Bearer ' + token;

      const res = await fetch(CONVEX_URL + '/api/query', {
        method: 'POST',
        headers,
        body: JSON.stringify({ path, args, format: 'json' })
      });

      const result = await res.json();
      if (result.status === 'error') throw new Error(result.errorMessage);
      return result.value;
    }

    async function callMutation(path, args) {
      const token = getAccessToken();
      if (!token) throw new Error('Not authenticated');

      const res = await fetch(CONVEX_URL + '/api/mutation', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ path, args, format: 'json' })
      });

      const result = await res.json();
      if (result.status === 'error') throw new Error(result.errorMessage);
      return result.value;
    }

    // ── Auth gate ───────────────────────────────────
    let allLetters = [];
    let currentTab = 'pending';

    (async function init() {
      const token = getAccessToken();
      if (!token) {
        window.location.href = '/connect/?return=/diff/admin/';
        return;
      }

      try {
        const me = await callQuery('users:me', {});
        if (!me || !ADMIN_HANDLES.includes(me.handle)) {
          window.location.href = '/diff/';
          return;
        }
        await loadLetters();
      } catch (err) {
        console.error('Auth check failed:', err);
        window.location.href = '/diff/';
      }
    })();

    // ── Data loading ────────────────────────────────
    async function loadLetters() {
      try {
        allLetters = await callQuery('loveLetters:listAdmin', {});
        updateStats();
        renderTab();
      } catch (err) {
        console.error('Failed to load letters:', err);
        document.getElementById('card-stack').innerHTML = '<div class="empty-state">Failed to load love letters.</div>';
      }
    }

    function updateStats() {
      const counts = { pending: 0, published: 0, rejected: 0 };
      allLetters.forEach(l => { if (counts[l.status] !== undefined) counts[l.status]++; });
      document.getElementById('stat-pending').textContent = counts.pending;
      document.getElementById('stat-published').textContent = counts.published;
      document.getElementById('stat-rejected').textContent = counts.rejected;
      document.getElementById('tab-count-pending').textContent = counts.pending ? `(${counts.pending})` : '';
      document.getElementById('tab-count-published').textContent = counts.published ? `(${counts.published})` : '';
      document.getElementById('tab-count-rejected').textContent = counts.rejected ? `(${counts.rejected})` : '';
    }

    // ── Tab switching ───────────────────────────────
    function switchTab(tab, btn) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderTab();
    }

    // ── Render ──────────────────────────────────────
    function getInitials(name) {
      return (name || '?').split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
    }

    function formatDate(ts) {
      const d = new Date(ts);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function renderTab() {
      const stack = document.getElementById('card-stack');
      const filtered = allLetters.filter(l => l.status === currentTab);

      if (filtered.length === 0) {
        stack.innerHTML = `<div class="empty-state">No ${currentTab} love letters.</div>`;
        return;
      }

      stack.innerHTML = filtered.map(letter => {
        const initials = getInitials(letter.displayName);
        const avatarHtml = letter.photoUrl
          ? `<img src="${letter.photoUrl}" alt="${letter.displayName}" onerror="this.outerHTML='<span class=\\'admin-avatar-initials\\'>${initials}</span>'">`
          : `<span class="admin-avatar-initials">${initials}</span>`;

        const roleText = [letter.role, letter.company].filter(Boolean).join(' @ ');

        let actionsHtml = '';
        if (currentTab === 'pending') {
          actionsHtml = `
            <button class="action-btn btn-publish" onclick="moderate('${letter._id}', 'published', this)">Publish</button>
            <button class="action-btn btn-reject" onclick="moderate('${letter._id}', 'rejected', this)">Reject</button>`;
        } else if (currentTab === 'published') {
          actionsHtml = `<button class="action-btn btn-unpublish" onclick="moderate('${letter._id}', 'pending', this)">Unpublish</button>`;
        } else if (currentTab === 'rejected') {
          actionsHtml = `<button class="action-btn btn-publish" onclick="moderate('${letter._id}', 'published', this)">Publish</button>`;
        }

        return `
          <div class="admin-card" id="card-${letter._id}">
            <div class="admin-card-top">
              <div class="admin-avatar">${avatarHtml}</div>
              <div class="admin-card-body">
                <div class="admin-card-name">${letter.displayName}</div>
                <div class="admin-card-role">${roleText}${letter.function_ ? ' &middot; ' + letter.function_ : ''}${letter.seniority ? ' &middot; ' + letter.seniority : ''}</div>
                <div class="admin-card-text">${letter.text}</div>
                <div class="admin-card-meta">${formatDate(letter.createdAt)} &middot; @${letter.handle}</div>
                <div class="admin-card-actions">${actionsHtml}</div>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    // ── Moderation action ───────────────────────────
    async function moderate(id, newStatus, btn) {
      btn.disabled = true;
      const origText = btn.textContent;
      btn.textContent = '...';

      try {
        await callMutation('loveLetters:moderate', { id, status: newStatus });
        // Update local data
        const letter = allLetters.find(l => l._id === id);
        if (letter) letter.status = newStatus;
        updateStats();
        renderTab();
      } catch (err) {
        console.error('Moderation failed:', err);
        alert('Failed: ' + err.message);
        btn.disabled = false;
        btn.textContent = origText;
      }
    }
  </script>

</body>
</html>
